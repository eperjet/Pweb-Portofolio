<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Realm - Portfolio</title>
    <meta name="description" content="A dark fantasy portfolio inspired by game UI aesthetics.">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Lato:wght@300;400;700&display=swap"
        rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Magical Environment Effects -->
    <div class="particles"></div>
    <div class="fog-overlay"></div>

    <!-- Navigation -->
    <header class="game-nav">
        <div class="logo">
            <span class="gold-text">FRZ</span>
        </div>
        <nav>
            <a href="index.html">Journey</a>
            <a href="about.html">About Me</a>
            <a href="porto.html">Portofolio</a>
            <a href="kontak.html">Kontak</a>
        </nav>
    </header>

    <main style="padding-top: 100px;">
        <!-- Contact Section -->
        <section id="contact" class="summon-section">
            <div class="content-wrapper reveal">
                <div class="summon-container card-bg">
                    <div class="summon-lore">
                        <h2 class="section-title text-glow">Summon Me</h2>
                        <p>Need an ally for your next grand quest? Send a raven or cast a messaging spell using the
                            portal below.</p>

                        <div class="contact-runes">
                            <!-- GANTI KONTAK DI SINI -->
                            <div class="rune-item">
                                <i class="fa-solid fa-scroll"></i>
                                <span>fikranfrz@gmail.com</span>
                            </div>
                            <div class="rune-item">
                                <i class="fa-solid fa-crystal-ball"></i>
                                <span>089632327583</span>
                            </div>
                            <div class="rune-item">
                                <i class="fa-solid fa-map-location-dot"></i>
                                <span>Bengkulu, Realm of Indonesia</span>
                            </div>
                        </div>
                    </div>

                    <form class="magic-form" id="contactForm">
                        <div class="input-group">
                            <label>Your Name (Traveler)</label>
                            <input type="text" id="name" required placeholder="Enter thy name">
                        </div>
                        <div class="input-group">
                            <label>Raven Address (Email)</label>
                            <input type="email" id="email" required placeholder="Enter thy email">
                        </div>
                        <div class="input-group">
                            <label>The Message</label>
                            <textarea id="message" rows="4" required placeholder="Speak thy mind..."></textarea>
                        </div>
                        <button type="submit" class="btn-gold-cta small">
                            <span class="btn-text">Cast Spell (Send)</span>
                            <span class="btn-glow"></span>
                        </button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
